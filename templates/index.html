<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISEI - Simulador Epidemiológico</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app-container">
    <header class="header">
        <h1>Sistema de Simulación Epidemiológica</h1>
        <p>Modelo de Variables Separables: dI/dt = kI</p>
    </header>

    <div class="search_container">
        <div class="group">
            <svg viewBox="0 0 24 24" aria-hidden="true" class="icon" id="searchBtn">
                <path d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"></path>
            </svg>
            <input class="input" id="cityInput" type="search" placeholder="Buscar ciudad..." autocomplete="off"/>
        </div>
    </div>

    <main class="dashboard">
        <section class="panel control-panel">
            <div class="city-info">
                📍 <span id="cityName">Ninguna</span> SIMULACION<span id="cityPop">-</span>
            </div>
            
            <h2>Controles de simulación</h2>
            <div class="form-group">
                <label class="label"><span class="title">Infectados (I₀)</span><input id="I0" class="input-field" type="number" value="1"/></label>
            </div>
            <div class="form-group">
                <label class="label"><span class="title">Tasa (β)</span><input id="beta" class="input-field" type="number" value="0.2" step="0.01"/></label>
            </div>
            <div class="form-group">
                <label class="label"><span class="title">Tiempo (Días)</span><input id="t_max" class="input-field" type="number" value="10"/></label>
            </div>
            <div class="form-group">
                <label class="label">
                    <span class="title">Cuarentena</span>
                    <select id="quarantineLevel" class="input-field">
                        <option value="1.0">Sin Restricciones</option>
                        <option value="0.75">Distanciamiento</option>
                        <option value="0.40">Parcial</option>
                        <option value="0.10">Total</option>
                    </select>
                </label>
            </div>

            <div class="container-btn" onclick="simular()">
                <a href="#" id="simularBtn" class="button type--C">
                    <span class="button__text">SIMULAR</span>
                </a>
            </div>

            <div style="display: flex; gap: 8px; margin-top: 15px; justify-content: space-between;">
                <button onclick="guardarEscenario()" style="background: #1E3A5F; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 11px; flex: 1;">💾 FIJAR</button>
                <button onclick="descargarCSV()" style="background: #2ecc71; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 11px; flex: 1;">📊 EXPORTAR</button>
            </div>
        </section>

        <section class="panel chart-panel">
            <div class="menu-wrapper">
                <label class="hamburger">
                    <input type="checkbox" id="menuToggle">
                    <svg viewBox="0 0 32 32">
                        <path class="line line-top-bottom" d="M27 10 13 10C10.8 10 9 8.2 9 6 9 3.5 10.8 2 13 2 15.2 2 17 3.8 17 6L17 26C17 28.2 18.8 30 21 30 23.2 30 25 28.2 25 26 25 23.8 23.2 22 21 22L7 22"></path>
                        <path class="line" d="M7 16 27 16"></path>
                    </svg>
                    <div class="chart-controls">
                        <button class="view-btn" onclick="escenariosFijados=[]; graficar();" style="color: red;">🗑 Limpiar Escenarios</button>
                    </div>
                </label>
            </div>
            <canvas id="grafica"></canvas>
        </section>

        <section class="panel info-panel">
            <h2 class="info-title">Métricas</h2>
            <div class="info-item"><span>⏱ Tiempo</span><span class="value" id="tiempo">-</span></div>
            <div class="info-item"><span>📈 Analítica</span><span class="value" id="val_analitica">-</span></div>
            <div class="info-item"><span>🔢 Numérica</span><span class="value" id="val_numerica">-</span></div>
        </section>
    </main>
</div>

<div id="modal" class="modal">
    <div class="modal-content"><span id="closeModal">&times;</span><h2 id="modalTitle"></h2><p id="modalText"></p></div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
