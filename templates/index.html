<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulación de Propagación de Virus</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app-container">


    <header class="header">
        <h1> Sistema de Simulación Epidemiológica</h1>
        <p>Monitoreo y análisis del crecimiento de contagios</p>
    </header>

    <div class="search_container">

<div class="group">
  <svg viewBox="0 0 24 24" aria-hidden="true" class="icon" id="searchBtn">
    <g>
      <path
        d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"
      ></path>
    </g>
  </svg>
  <input class="input" id="cityInput" type="search" placeholder="Buscar ciudad..." />
</div>

    </div>
</div>



    <main class="dashboard">

        <!-- PANEL IZQUIERDO -->
        <section class="panel control-panel">

            <p style="font-size: 0.8rem; margin-top: 5px; color: #555;">
        Ciudad activa: <span id="cityName">Ninguna</span> | 
        Pob: <span id="cityPop">-</span>
    </p>

            <h2>Parámetros</h2>

            <div class="form-group">
                <label>Infectados iniciales </label>
                <input type="number" id="I0" value="10">
            </div>

            <div class="form-group">
                <label>Tasa de contagio (β)</label>
                <input type="number" step="0.01" id="beta" value="0.2">
            </div>

            <div class="form-group">
                <label>Tiempo (días)</label>
                <input type="number" id="t_max" value="10">
            </div>

            <div class="container" onclick="simular()">
                <a href="#" id="simularBtn" class="button type--C">
                    <div class="button__line"></div>
                    <div class="button__line"></div>
                    <span class="button__text">SIMULAR</span>
                </a>
            </div>

        </section>

        <!-- CENTRO (GRÁFICA) -->
        <section class="panel chart-panel">
            <canvas id="grafica"></canvas>
        </section>

        <!-- DERECHA (DATOS) -->
        <section class="panel info-panel">

            <h2 class="info-title">Datos en tiempo real</h2>

            <div class="info-item">
                <span class="label">⏱ Tiempo</span>
                <span class="value" id="tiempo">-</span>
            </div>

            <div class="info-item">
                <span class="label">📈 Analítica</span>
                <span class="value" id="val_analitica">-</span>
            </div>

            <div class="info-item">
                <span class="label">🔢 Numérica</span>
                <span class="value" id="val_numerica">-</span>
            </div>

        </section>

    </main>

</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span id="closeModal">&times;</span>
        <h2 id="modalTitle"></h2>
        <p id="modalText"></p>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
