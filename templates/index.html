<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISEI - Simulador Epidemiológico</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app-container">
    <header class="header">
        <h1>Sistema de Simulación Epidemiológica</h1>
        <p>Monitoreo y análisis del crecimiento de contagios</p>
        <link rel="icon" href="data:,">
    </header>

    <div class="search_container">
        <div class="group">
            <svg viewBox="0 0 24 24" aria-hidden="true" class="icon" id="searchBtn">
                <g>
                    <path d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"></path>
                </g>
            </svg>
            <input class="input" id="cityInput" type="search" placeholder="Buscar ciudad (Ej. Apizaco)..." list="citiesList" autocomplete="off"/>
            <datalist id="citiesList"></datalist>
        </div>
    </div>

    <main class="dashboard">
        <section class="panel control-panel">
            <div class="city-info">
                <span class="city-label">📍 Ciudad:</span> <span id="cityName">Ninguna</span>
                <span class="city-label">👥 Pob:</span> <span id="cityPop">-</span>
            </div>
            
            <h2>Configuración</h2>

            <div class="form-group">
                <label class="label">
                    <span class="title">Infectados Iniciales</span>
                    <input id="I0" class="input-field" type="number" placeholder="0" min="0" />
                </label>
            </div>

            <div class="form-group">
                <label class="label">
                    <span class="title">Tasa de contagio (β)</span>
                    <input id="beta" class="input-field" type="number" placeholder="0.2" step="0.01" />
                </label>
            </div>

            <div class="form-group">
                <label class="label">
                    <span class="title">Tiempo (días)</span>
                    <input id="t_max" class="input-field" type="number" value="10" min="1" />
                </label>
            </div>

            <div class="form-group">
                <label class="label">
                    <span class="title">Nivel de Cuarentena</span>
                    <select id="quarantineLevel" class="input-field">
                        <option value="1.0">Sin Restricciones (100%)</option>
                        <option value="0.75">Distanciamiento Social (75%)</option>
                        <option value="0.40">Cuarentena Parcial (40%)</option>
                        <option value="0.10">Confinamiento Total (10%)</option>
                    </select>
                </label>
            </div>

            <div class="container-btn" onclick="simular()">
                <a href="#" id="simularBtn" class="button type--C">
                    <div class="button__line"></div>
                    <div class="button__line"></div>
                    <span class="button__text">SIMULAR</span>
                    <div class="button__drow1"></div>
                    <div class="button__drow2"></div>
                </a>
            </div>
        </section>

        <section class="panel chart-panel">
           <div class="menu-wrapper">
    <label class="hamburger">
        <input type="checkbox" id="menuToggle">
        <svg viewBox="0 0 32 32">
            <path class="line line-top-bottom" d="M27 10 13 10C10.8 10 9 8.2 9 6 9 3.5 10.8 2 13 2 15.2 2 17 3.8 17 6L17 26C17 28.2 18.8 30 21 30 23.2 30 25 28.2 25 26 25 23.8 23.2 22 21 22L7 22"></path>
            <path class="line" d="M7 16 27 16"></path>
        </svg>

        <div class="chart-controls">
            <div class="view-selector">
                <p style=" font-weight: bold; margin-bottom: 10px;">Visualización</p>
                <button class="view-btn" onclick="cambiarVista('logistica')">Curva Analítica</button>
                <button class="view-btn" onclick="cambiarVista('sir')">Modelo SIR</button>
                <button class="view-btn" onclick="cambiarVista('incidencia')">Casos Diarios</button>
                <button class="view-btn" onclick="cambiarVista('reproduccion')">Tasa de Reproducción</button>
            </div>
        </div>
    </label>
</div>

            <div id="mainLoader" class="loader" style="display: none;">
                <div class="loader-square"></div>
                <div class="loader-square"></div>
                <div class="loader-square"></div>
                <div class="loader-square"></div>
                <div class="loader-square"></div>
                <div class="loader-square"></div>
                <div class="loader-square"></div>
            </div>

            <canvas id="grafica"></canvas>
        </section>

        <section class="panel info-panel">
            <h2 class="info-title">Métricas del Punto</h2>
            <div class="info-item">
                <span class="info-label">⏱ Tiempo</span>
                <span class="value" id="tiempo">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">📈 Analítica</span>
                <span class="value" id="val_analitica">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">🔢 Numérica</span>
                <span class="value" id="val_numerica">-</span>
            </div>
        </section>
    </main>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span id="closeModal">&times;</span>
        <h2 id="modalTitle"></h2>
        <p id="modalText"></p>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
